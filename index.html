<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uray Güvenlik</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        /* --- HAREKETLİ GİRİŞ ANİMASYONU --- */
        #loading-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #090d16;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.8s cubic-bezier(0.77, 0, 0.175, 1);
        }
        .loading-text {
            font-size: 32px;
            font-weight: 900;
            color: #38bdf8;
            letter-spacing: 4px;
            text-transform: uppercase;
            animation: pulse 1.5s infinite ease-in-out;
            text-shadow: 0 0 15px rgba(56, 189, 248, 0.6);
        }
        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 0.5; filter: blur(1px); }
            50% { transform: scale(1); opacity: 1; filter: blur(0px); }
            100% { transform: scale(0.95); opacity: 0.5; filter: blur(1px); }
        }
        .kapat-ekran { transform: translateY(-100%); }

        /* --- Giriş Kartı Tasarımı --- */
        .hero-container {
            display: flex;
            justify-content: center;
            width: 100%;
            max-width: 800px;
            margin-top: 40px;
        }
        .card {
            background-color: #1e293b;
            padding: 40px 20px;
            border-radius: 20px;
            text-align: center;
            width: 100%;
            border: 1px solid #334155;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .profile-img {
            width: 160px;
            height: 160px;
            object-fit: cover;
            border-radius: 50%;
            border: 4px solid #38bdf8;
            margin-bottom: 20px;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.2);
        }
        h1 { font-size: 26px; margin-bottom: 10px; color: #38bdf8; }
        p { color: #94a3b8; font-size: 15px; line-height: 1.5; margin-bottom: 25px; }
        .btn-group { display: flex; flex-direction: column; gap: 12px; }
        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 15px;
            text-align: center;
            text-decoration: none;
            transition: 0.3s;
        }
        .btn-whatsapp { background-color: #25d366; color: #ffffff; }
        .btn-whatsapp:hover { background-color: #20ba5a; transform: scale(1.02); }
        .btn-phone { background-color: #38bdf8; color: #0f172a; }
        .btn-phone:hover { background-color: #0ea5e9; transform: scale(1.02); }

        /* --- Genel Bölüm Tasarımları --- */
        section {
            width: 100%;
            max-width: 800px;
            padding: 60px 20px;
            margin-top: 20px;
            border-top: 1px solid #334155;
        }
        section h2 { font-size: 28px; color: #38bdf8; margin-bottom: 30px; text-align: center; }

        /* Hizmet Kutuları Grid */
        .hizmetler-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(230px, 1fr)); gap: 20px; }
        .hizmet-karti {
            background-color: #1e293b; 
            padding: 25px; 
            border-radius: 15px;
            border: 1px solid #334155; 
            transition: 0.3s; 
            cursor: pointer; 
            height: 100%;
        }
        .hizmet-karti:hover { border-color: #38bdf8; transform: translateY(-5px); }
        .hizmet-karti h3 { color: #f8fafc; margin-bottom: 12px; font-size: 18px; }
        .hizmet-karti p { margin-bottom: 0; font-size: 14px; color: #94a3b8; }
