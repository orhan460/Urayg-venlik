<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uray Güvenlik</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        /* --- Giriş Kartı Tasarımı --- */
        .hero-container {
            display: flex;
            justify-content: center;
            width: 100%;
            max-width: 800px;
            margin-top: 40px;
        }
        .card {
            background-color: #1e293b;
            padding: 40px 20px;
            border-radius: 20px;
            text-align: center;
            width: 100%;
            border: 1px solid #334155;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .profile-img {
            width: 160px;
            height: 160px;
            object-fit: cover;
            border-radius: 50%;
            border: 4px solid #38bdf8;
            margin-bottom: 20px;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.2);
        }
        h1 { font-size: 26px; margin-bottom: 10px; color: #38bdf8; }
        p { color: #94a3b8; font-size: 15px; line-height: 1.5; margin-bottom: 25px; }
        .btn-group { display: flex; flex-direction: column; gap: 12px; }
        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 15px;
            text-align: center;
            text-decoration: none;
            transition: 0.3s;
        }
        .btn-whatsapp { background-color: #25d366; color: #ffffff; }
        .btn-whatsapp:hover { background-color: #20ba5a; transform: scale(1.02); }
        .btn-phone { background-color: #38bdf8; color: #0f172a; }
        .btn-phone:hover { background-color: #0ea5e9; transform: scale(1.02); }

        /* --- Genel Bölüm Tasarımları --- */
        section {
            width: 100%;
            max-width: 800px;
            padding: 60px 20px;
            margin-top: 20px;
            border-top: 1px solid #334155;
        }
        section h2 { font-size: 28px; color: #38bdf8; margin-bottom: 30px; text-align: center; }

        /* Hizmet Kutuları Grid */
        .hizmetler-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(230px, 1fr)); gap: 20px; }
        .hizmet-karti {
            background-color: #1e293b; 
            padding: 25px; 
            border-radius: 15px;
            border: 1px solid #334155; 
            transition: 0.3s; 
            cursor: pointer; 
            height: 100%;
        }
        .hizmet-karti:hover { border-color: #38bdf8; transform: translateY(-5px); }
        .hizmet-karti h3 { color: #f8fafc; margin-bottom: 12px; font-size: 18px; }
        .hizmet-karti p { margin-bottom: 0; font-size: 14px; color: #94a3b8; }

        /* --- KAMERA KATALOGU MODAL --- */
        .modal-arka-plan {
            display: none; position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(15, 23, 42, 0.85); backdrop-filter: blur(8px);
            z-index: 1000; justify-content: center; align-items: center; padding: 20px;
        }
        .modal-icerik {
            background-color: #1e293b; border: 1px solid #334155;
            border-radius: 20px; max-width: 750px; width: 100%;
            max-height: 85vh; overflow-y: auto; padding: 30px;
            position: relative; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .modal-kapat {
            position: absolute; top: 15px; right: 20px;
            font-size: 30px; color: #64748b; cursor: pointer; transition: 0.3s;
        }
        .modal-kapat:hover { color: #f43f5e; }
        .modal-baslik { color: #38bdf8; margin-bottom: 25px; font-size: 24px; text-align: center; }

        /* --- ŞİFRELEME PANELİ TASARIMI --- */
        .login-box {
            background-color: #0f172a;
            border: 1px solid #334155;
            padding: 25px;
            border-radius: 12px;
            max-width: 400px;
            margin: 20px auto;
            text-align: center;
        }
        .login-box h4 { margin-bottom: 15px; color: #f8fafc; }
        .login-box p { font-size: 13px; color: #64748b; margin-bottom: 15px; }
        .login-input {
            width: 100%; padding: 12px; margin-bottom: 12px;
            border-radius: 6px; border: 1px solid #334155;
            background-color: #1e293b; color: #f8fafc; outline: none;
        }
        .login-input:focus { border-color: #38bdf8; }
        .btn-login {
